<div class="shell" [class.collapsed]="!sidebarOpen()">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-gem">◈</span>
        <span class="brand-name">FinTrack</span>
      </div>
      <button class="collapse-btn" (click)="toggleSidebar()" title="Toggle sidebar">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">
            @if (item.icon === 'grid') {
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            }
            @if (item.icon === 'swap') {
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 5H14M14 5L11 2M14 5L11 8M14 11H2M2 11L5 8M2 11L5 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            }
            @if (item.icon === 'chart') {
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M1 12L5 7L8 10L11 5L15 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 15H15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            }
          </span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="version-badge">v1.0.0</div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="mobile-toggle" (click)="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 4H16M2 9H16M2 14H16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="topbar-date num">{{ today | date:'EEE, MMM d, y' }}</div>
    </header>

    <div class="page-content">
      <router-outlet />
    </div>
  </main>

</div>
